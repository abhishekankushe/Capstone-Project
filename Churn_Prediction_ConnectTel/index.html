<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectTel Churn Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
        <h2 class="text-2xl font-bold mb-6 text-blue-600 text-center">Customer Churn Predictor</h2>
        <form id="churnForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Tenure (Months)</label>
                <input type="number" id="tenure" required
                    class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Monthly Charges ($)</label>
                <input type="number" id="monthly_charges" step="0.01" required
                    class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Contract Type</label>
                <select id="contract" class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                    <option value="Month-to-Month">Month-to-Month</option>
                    <option value="1 Year">1 Year</option>
                    <option value="2 Year">2 Year</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Complaints (Last 3 Months)</label>
                <input type="number" id="complaints" value="0" required
                    class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700">
                Predict Risk
            </button>
        </form>
        <div id="resultBox" class="mt-6 hidden p-4 rounded-md text-center">
            <h3 class="text-lg font-bold" id="riskLevel"></h3>
            <p class="text-sm mt-1" id="probText"></p>
        </div>
    </div>
    <script>
        document.getElementById("churnForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            const data = {
                tenure_months: parseInt(document.getElementById("tenure").value),
                monthly_charges: parseFloat(document.getElementById("monthly_charges").value),
                total_charges: parseFloat(document.getElementById("monthly_charges").value) * parseInt(document.getElementById("tenure").value),
                arpu: parseFloat(document.getElementById("monthly_charges").value) * 0.9,
                num_complaints_3m: parseInt(document.getElementById("complaints").value),
                contract_type: document.getElementById("contract").value
            };
            try {
                const response = await fetch("http://127.0.0.1:8000/predict", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-API-Key": "prabhudev-connecttel-secret-key-2026" // <--- YOUR API KEY IS HERE
                    },
                    body: JSON.stringify(data)
                });

                // Check if the API Key was rejected
                if (response.status === 403) {
                    alert("Access Denied: Invalid API Key");
                    return;
                }

                const result = await response.json();
                const resultBox = document.getElementById("resultBox");
                const riskLevel = document.getElementById("riskLevel");
                const probText = document.getElementById("probText");

                resultBox.classList.remove("hidden", "bg-red-100", "text-red-800", "bg-green-100", "text-green-800");

                if (result.churn_prediction === 1) {
                    resultBox.classList.add("bg-red-100", "text-red-800");
                    riskLevel.innerText = "🚨 HIGH RISK OF CHURN";
                } else {
                    resultBox.classList.add("bg-green-100", "text-green-800");
                    riskLevel.innerText = "✅ LOW RISK";
                }
                probText.innerText = `Probability of leaving: ${(result.churn_probability * 100).toFixed(1)}%`;
            } catch (error) {
                alert("Error connecting to the API. Is FastAPI running?");
            }
        });
    </script>
</body>

</html>
